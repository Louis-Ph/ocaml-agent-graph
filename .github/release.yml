changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - api-break
    - title: Security
      labels:
        - security
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Maintenance
      labels:
        - chore
        - ci
        - refactor
        - test
  exclude:
    labels:
      - skip-changelog
